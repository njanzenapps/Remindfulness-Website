<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remindfulness</title>
    <style>
        /* Base Page Styles */
        body {
            margin: 0;
            padding: 40px 20px;
            background-image: url('bg.png');
            background-repeat: repeat;
            font-family: 'Century Gothic', 'Futura', sans-serif;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Main Wrapper Box */
        .container {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            text-align: center;
        }

        /* Header Elements */
        .word-logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.25rem;
            font-weight: 300;
            line-height: 1.4;
            margin: 0 auto 25px auto;
            max-width: 600px;
        }

        .app-store-btn {
            display: inline-block;
            margin-bottom: 40px;
        }

        .app-store-btn img {
            width: 170px;
            height: auto;
        }

        /* Flexible Middle Section Layout */
        .content-layout {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        /* Banner Container */
        .banner-box {
            flex: 1;
            max-width: 550px;
        }

        .banner-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        /* Navigation Buttons Container */
        .nav-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 250px;
        }

        .nav-buttons a {
            display: block;
            transition: transform 0.2s ease;
        }

        .nav-buttons a:hover {
            transform: scale(1.03);
        }

        .nav-buttons img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Footer Product Editions Layout */
        .editions-footer {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .edition-item {
            flex: 1;
            max-width: 200px;
        }

        /* Styling text-based links at the bottom */
        .edition-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .edition-link:hover .edition-title {
            text-decoration: underline;
        }

        .edition-title {
            font-size: 1.1rem;
            font-weight: normal;
            margin: 0 0 4px 0;
        }

        .edition-status {
            font-size: 0.9rem;
            font-style: italic;
            color: #666666;
            margin: 0;
        }

        /* 📱 Responsive Mobile Adjustments */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .tagline {
                font-size: 1.1rem;
            }

            /* Switches middle layout from Side-by-Side to Top-to-Bottom */
            .content-layout {
                flex-direction: column;
                gap: 25px;
            }

            .banner-box {
                width: 100%;
            }

            .nav-buttons {
                width: 100%;
                max-width: 260px;
            }

            /* Flips bottom row to a vertical list on small screens */
            .editions-footer {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header Section -->
        <header>
            <img src="wordlogo.png" alt="Remindfulness" class="word-logo">
            <p class="tagline">Apps that remind you to be mindful throughout your busy day</p>
            
            <!-- App Store Link Placeholder -->
            <a href="https://apps.apple.com/us/app/remindfulness/id588697678" class="app-store-btn" target="_blank">
                <img src="appstore2.png" alt="Download on the App Store">
            </a>
        </header>

        <!-- Main Content Area -->
        <main class="content-layout">
            <!-- Left Side: Interactive Graphic Banner -->
            <div class="banner-box">
                <img src="banner.png" alt="Remindfulness Graphic Banner">
            </div>

            <!-- Right Side: Navigation Buttons Placeholders -->
            <nav class="nav-buttons">
                <a href="https://www.remindfulnessapp.com"><img src="button1.png" alt="Home"></a>
                <a href="https://www.remindfulnessapp.com/privacy-policy.html"><img src="button2.png" alt="Privacy Policy"></a>
                <a href="https://www.remindfulnessapp.com/support.html"><img src="button3.png" alt="Support"></a>
            </nav>
        </main>

        <!-- Footer Section: Hyperlinked Text Editions Placeholders -->
        <footer class="editions-footer">
            <div class="edition-item">
                <a href="https://www.remindfulnessapp.com/classic-edition.html" class="edition-link">
                    <h3 class="edition-title">Classic Edition</h3>
                    <p class="edition-status">Available now</p>
                </a>
            </div>
            <div class="edition-item">
                <a href="https://www.remindfulnessapp.com/recovery-edition.html" class="edition-link">
                    <h3 class="edition-title">Recovery Edition</h3>
                    <p class="edition-status">Returning Soon</p>
                </a>
            </div>
            <div class="edition-item">
                <a href="https://www.remindfulnessapp.com/tf-edition.html" class="edition-link">
                    <h3 class="edition-title">Twin Flame Edition</h3>
                    <p class="edition-status">NEW Coming Soon</p>
               </a>
            </div>
        </footer>

        <!-- Copyright Info -->
        <p class="copyright-notice">&copy; Copyright 2013-2026 Naomi Janzen - Freedom Techniques</p>
    </div>

</body>
</html>
